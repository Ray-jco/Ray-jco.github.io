# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.

# Main Page Setup

title: Jullian Raymund Co's Portfolio # This is what shows up in the tab of the browser



# Hero Section
name: Jullian Raymund Co
headline: Welcome to my portfolio
description: >- # dont remove this line. this will ignore all new lines until the next section
  Hello, I'm Jullian.
  I am a first-year Mechanical and Design Engineering student at City, University of London with a strong interest in mechanical design, CAD modelling, and product development.
  I enjoy applying engineering principles to create practical solutions, from concept development and modelling to manufacturing and testing.
  This portfolio showcases my academic and personal projects. 

# Place your profile image in /assets/images/profile-image/folder and edit the file name
profile_image: ./assets/images/profile-image/avatar.jpeg


# Link your resume
# You can place your resume in assets/resume/{resume.pdf or add external link such as pdf saved in google drive 
